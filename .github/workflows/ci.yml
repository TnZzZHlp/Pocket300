name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_KEYSTORE_BASE64: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && secrets.RELEASE_KEYSTORE_BASE64 || '' }}
      RELEASE_STORE_PASSWORD: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && secrets.RELEASE_STORE_PASSWORD || '' }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS || 'pocket300' }}
      RELEASE_KEY_PASSWORD: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && secrets.RELEASE_KEY_PASSWORD || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect code and build changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" || -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            code_changed=true
          elif git diff --quiet "$BASE_SHA" "$GITHUB_SHA" -- \
            app/ \
            gradle/ \
            build.gradle.kts \
            settings.gradle.kts \
            gradle.properties \
            gradlew \
            gradlew.bat \
            build-release.ps1 \
            .github/workflows/; then
            code_changed=false
          else
            code_changed=true
          fi

          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"
          echo "Code or build configuration changed: $code_changed"

      - name: Set up JDK
        if: steps.changes.outputs.code_changed == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        if: steps.changes.outputs.code_changed == 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Make Gradle wrapper executable
        if: steps.changes.outputs.code_changed == 'true'
        run: chmod +x gradlew

      - name: Validate signing secrets
        if: steps.changes.outputs.code_changed == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        shell: bash
        run: |
          for name in RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "Missing repository secret: $name" >&2
              exit 1
            fi
          done

      - name: Restore release signing keystore
        if: steps.changes.outputs.code_changed == 'true' && env.RELEASE_KEYSTORE_BASE64 != ''
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/pocket300-release.jks"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "RELEASE_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Run unit tests, lint and debug build
        if: steps.changes.outputs.code_changed == 'true'
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --stacktrace

      - name: Upload reports
        if: always() && steps.changes.outputs.code_changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ci-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish debug APK
        if: steps.changes.outputs.code_changed == 'true' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          apk="Pocket300-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$apk"
          if gh release view continuous >/dev/null 2>&1; then
            gh release upload continuous "$apk" --clobber
            gh release edit continuous \
              --notes "Latest debug build from commit ${GITHUB_SHA}."
          else
            gh release create continuous "$apk" \
              --target "$GITHUB_SHA" \
              --title "Pocket300 continuous build" \
              --notes "Latest debug build from commit ${GITHUB_SHA}." \
              --prerelease
          fi
