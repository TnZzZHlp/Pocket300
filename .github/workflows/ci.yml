name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests, lint and debug build
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish debug APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          apk="Pocket300-debug.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$apk"
          if gh release view continuous >/dev/null 2>&1; then
            gh release upload continuous "$apk" --clobber
            gh release edit continuous \
              --notes "Latest debug build from commit ${GITHUB_SHA}."
          else
            gh release create continuous "$apk" \
              --target "$GITHUB_SHA" \
              --title "Pocket300 continuous build" \
              --notes "Latest debug build from commit ${GITHUB_SHA}." \
              --prerelease
          fi
